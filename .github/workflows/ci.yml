name: "ci"
on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install LaTeX tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            latexmk \
            texlive-latex-extra \
            texlive-pictures \
            texlive-bibtex-extra \
            texlive-fonts-recommended
      - name: Install dependencies
        run: npm ci
      - name: Build PDF + sync version
        run: npm run -s set-build
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: solutions-pdf
          path: src/solutions.pdf